name: Build and Upload Static Assets

on:
  push:
  workflow_dispatch:

env:
  DJANGO_SETTINGS_MODULE: ${{ vars.DJANGO_SETTINGS_MODULE }}
  DJANGO_SECRET_KEY: ${{ vars.DJANGO_SECRET_KEY }}
  AWS_S3_CUSTOM_DOMAIN: ${{ vars.AWS_S3_CUSTOM_DOMAIN }}
  AWS_STORAGE_BUCKET_NAME: ${{ vars.AWS_STORAGE_BUCKET_NAME }}
  TARGET_ENV: test

jobs:
  collectstatic:
    runs-on: codebuild-bb-test-web-server-${{ github.run_id }}-${{ github.run_attempt }}

    # Use s3 mock for now
    # Issues with image: ghcr.io/adobe/s3mock:latest
    # Seems to be trying to pull from docker hub but is reaching a rate limit
    # I would need to authenticate to docker hub to pull the image, which we currently don't have a license for
    # Alternatively we can use github repository to push s3mock image from docker hub to
    # services:
    #   s3mock:
    #     image: ghcr.io/adobe/s3mock
    #     env:
    #       initialBuckets: django
    #       retainFilesOnExit: "true"
    #       root: /s3
    #     ports:
    #       - "9090:9090"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        run: |
          echo "Setting up Python 3.12 via pyenv..."
          pyenv install 3.12 --skip-existing || pyenv install 3.12.0 --skip-existing
          pyenv global 3.12 || pyenv global 3.12.0
          python3 --version

      - name: Set up Node
        run:  |
            apt-get update && apt-get install -y nodejs npm
            node --version
            npm --version

    #   - name: Wait for S3 mock to be ready
    #     run: |
    #       echo "Waiting for S3 mock to be ready..."
    #       until curl -s http://localhost:9090/health; do
    #         echo "S3 mock not ready yet, waiting..."
    #         sleep 5
    #       done
    #       echo "S3 mock is ready!"

      - name: Install python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/requirements.txt --no-deps --prefer-binary || pip install -r requirements/requirements.txt

      - name: Compile and Build CSS assets
        run:  |
            ls -la
            cd static/bluebutton-css
            npm i 
            npm run gulp

      - name: Collect static files
        run: |
          ls -la
          source venv/bin/activate
          echo "TARGET_ENV=$TARGET_ENV"
          python3 manage.py collectstatic --noinput
          ls -la

    #   - name: Upload static assets to S3 Dryrun
    #     run: |
    #       aws s3 sync /code/static/ s3://bb-static-assets/ --delete --dryrun