name: Build and Upload Static Assets

on:
  push:
  workflow_dispatch:

jobs:
  collectstatic:
    runs-on: codebuild-bb-test-web-server-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        run: |
          echo "Setting up Python 3.12 via pyenv..."
          pyenv install 3.12 --skip-existing || pyenv install 3.12.0 --skip-existing
          pyenv global 3.12 || pyenv global 3.12.0
          python3 --version

      - name: Set up Node
        run:  |
            apt-get update && apt-get install -y nodejs npm
            node --version
            npm --version

      - name: Install python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/requirements.txt --no-deps --prefer-binary || pip install -r requirements/requirements.txt

      - name: Compile and Build CSS assets
        run:  |
            ls -la
            cd static/bluebutton-css
            npm i 
            npm run gulp

      - name: Collect static files
        run: |
          python3 manage.py collectstatic --noinput

    #   - name: Upload static assets to S3 Dryrun
    #     run: |
    #       aws s3 sync /code/static/ s3://bb-static-assets/ --delete --dryrun