# Build and Deploy - Test

name: Build and Deploy [TEST]

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - impl
          - prod

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write # Required for requ esting the AWS IAM OIDC JWT
  contents: write # Required for actions/checkout
  actions: write # Required for GHA cache

jobs:
  build:
    # This runs on CodeBuild, not a public GitHub Action Runner.
    # TODO - Optimize CodeBuile usage, use public runners when appropriate
    runs-on:
      - codebuild-bb-${{ github.event.inputs.environment || 'test' }}-web-server-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_TEST }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Mask additional sensitive values
        run: |
          # Mask the role ARN
          echo "::add-mask::${{ secrets.AWS_ROLE_ARN_TEST }}"
          echo "::add-mask::${{ secrets.AWS_ROLE_ARN_IMPL }}"
          echo "::add-mask::${{ secrets.AWS_ROLE_ARN_PROD }}"

          # Get and mask account ID
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Mask ECR registry
        run: |
          echo "::add-mask::${{ steps.login-ecr.outputs.registry }}"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image to ECR
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/containers/bb-web-api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            # SHA tag FIRST (becomes the new source of truth)
            ${{ steps.login-ecr.outputs.registry }}/bb-${{ github.event.inputs.environment || 'test' }}-api:${{ github.sha }}
            # latest tag LAST (gets overwritten in next step)
            ${{ steps.login-ecr.outputs.registry }}/bb-${{ github.event.inputs.environment || 'test' }}-api:latest
          build-args: |
            BUILD_TARGET=production
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Rotate latest tag (previous-latest → SHA → new-latest)
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO_NAME="bb-${{ github.event.inputs.environment || 'test' }}-api"
          SHA="${{ github.sha }}"
          
          echo "Rotating tags for $REGISTRY/$REPO_NAME"
          echo "1. Get manifest from existing 'latest'..."
          
          # Get manifest digest from current 'latest' 
          OLD_MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$REPO_NAME" \
            --image-ids imageTag=latest \
            --query 'images[0].imageManifest' \
            --output text)
          
          echo "2. Tag previous-latest as SHA (immutable backup)..."
          aws ecr put-image \
            --repository-name "$REPO_NAME" \
            --image-tag "$SHA-old" \
            --image-manifest "$OLD_MANIFEST"
          
          echo "3. Tag new build as 'latest'..."
          NEW_MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$REPO_NAME" \
            --image-ids imageTag="$SHA" \
            --query 'images[0].imageManifest' \
            --output text)
          
          aws ecr put-image \
            --repository-name "$REPO_NAME" \
            --image-tag "latest" \
            --image-manifest "$NEW_MANIFEST"
          
          echo "✅ Rotation complete: latest → $SHA → latest"
