name: Run Django Management Command

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run against'
        required: true
        type: choice
        options:
          - test
          - sandbox
          - prod
      command:
        description: 'Django manage.py command to run'
        required: true
        default: 'migrate --noinput'
        type: choice
        options:
          - migrate --noinput
          - showmigrations
          - check
          - migrate --noinput --run-syncdb
          - collectstatic --noinput

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    name: Run "${{ inputs.command }}" on ${{ inputs.environment }}
    runs-on:
      - codebuild-bb-${{ (inputs.environment || 'test') == 'test' && 'test' || 'prod' }}-web-server-${{ github.run_id }}-${{ github.run_attempt }}
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS credentials
        uses: ./.github/actions/setup-tofu
        with:
          environment: ${{ inputs.environment }}
          non-prod-account: ${{ secrets.NON_PROD_ACCOUNT }}
          prod-account: ${{ secrets.PROD_ACCOUNT }}

      - name: Discover ECS environment
        id: network
        run: |
          # ops/ecs-discover.sh is the Fargate equivalent of inventory/aws_ec2.yaml —
          # dynamic resource discovery instead of hardcoded names.
          source ops/ecs-discover.sh "${{ inputs.environment }}"

          echo "cluster=${ECS_CLUSTER}"   >> "$GITHUB_OUTPUT"
          echo "family=${ECS_FAMILY}"     >> "$GITHUB_OUTPUT"
          echo "container=${ECS_CONTAINER}" >> "$GITHUB_OUTPUT"
          echo "net_config=${ECS_NET_CONFIG}" >> "$GITHUB_OUTPUT"

      - name: Run migration task
        id: run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.network.outputs.cluster }}" \
            --task-definition "${{ steps.network.outputs.family }}" \
            --launch-type FARGATE \
            --platform-version LATEST \
            --network-configuration '${{ steps.network.outputs.net_config }}' \
            --overrides "{
              \"containerOverrides\": [{
                \"name\": \"${{ steps.network.outputs.container }}\",
                \"command\": [\"bash\", \"-c\", \"export DATABASES_CUSTOM=\\\"postgres://\${DB_USER_NAME}:\${DB_USER_PW}@\${DB_HOST}:15432/\${DB_NAME}?sslmode=require&options=-c+role%3D\${DB_ROLE}\\\" && export DJANGO_SETTINGS_MODULE=hhs_oauth_server.settings.base && export PATH=\\\"\${HOME}/venv/bin:\${PATH}\\\" && echo \\\"Running: manage.py ${{ inputs.command }} on \${DB_HOST}:15432/\${DB_NAME} as \${DB_ROLE}\\\" && python manage.py ${{ inputs.command }} 2>&1\"]
              }]
            }" \
            --query 'tasks[0].taskArn' \
            --output text)

          TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          echo "Started task: $TASK_ID"

      - name: Wait for task to complete
        run: |
          echo "Waiting for task to finish..."
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.network.outputs.cluster }}" \
            --tasks "${{ steps.run-task.outputs.task_arn }}"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ steps.network.outputs.cluster }}" \
            --tasks "${{ steps.run-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Command failed with exit code $EXIT_CODE"
            exit 1
          fi

          echo "Command completed successfully."

      - name: Show task logs
        if: always()
        run: |
          sleep 5  # Wait for logs to propagate
          LOG_GROUP="/aws/ecs/fargate/bb-${{ inputs.environment }}-api"
          LOG_STREAM="ecs/bb-${{ inputs.environment }}-api/${{ steps.run-task.outputs.task_id }}"

          echo "Fetching logs from $LOG_GROUP / $LOG_STREAM"
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LOG_STREAM" \
            --start-from-head \
            --query 'events[*].message' \
            --output json | jq -r '.[]' || echo "Could not fetch logs"
