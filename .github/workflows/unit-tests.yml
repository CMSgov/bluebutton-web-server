name: Run Unit Tests

on:
    push:
    pull_request:
        branches: [master]

env:
    DJANGO_SETTINGS_MODULE: ${{ vars.DJANGO_SETTINGS_MODULE }}
    DJANGO_SECRET_KEY: ${{ vars.DJANGO_SECRET_KEY }}

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Python 3.12
              run: |
                echo "Setting up Python 3.12 via pyenv..."
                python3 --version
                which python3
                pip3 --version

            - name: Install python dependencies
              run: |
                python3 -m venv venv
                source venv/bin/activate
                python3 -m pip install --upgrade pip setuptools wheel
                pip install -r requirements/requirements.txt --no-deps --prefer-binary || pip install -r requirements/requirements.txt

            - name: Setup AWS credentials (Test)
              uses: ./.github/actions/setup-tofu
              with:
                environment: test
                non-prod-account: ${{ secrets.NON_PROD_ACCOUNT }}
                prod-account: ${{ secrets.PROD_ACCOUNT }}

            - name: Run unit tests
              run: |
                ls -la
                echo $TARGET_ENV
                source venv/bin/activate
                python runtests.py