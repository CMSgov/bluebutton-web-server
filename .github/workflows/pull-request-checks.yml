name: Pull Request Checks

on:
  pull_request:
    branches: [master]

jobs:
  ruff-unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/requirements.dev.txt --no-deps --prefer-binary --require-hashes

      - name: Run Ruff Linter
        run: |
          source venv/bin/activate
          ruff check

      - name: Run Unit Tests
        run: |
          source venv/bin/activate
          python manage.py test --exclude=integration

  integration-test:
    env:
      AWS_REGION: us-east-1

    permissions:
      id-token: write
      contents: read
    runs-on: codebuild-bb-${{ (inputs.environment || 'test') == 'test' && 'test' || 'prod' }}-web-server-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS credentials
        uses: ./.github/actions/setup-tofu
        with:
          environment: ${{ inputs.environment }}
          non-prod-account: ${{ secrets.NON_PROD_ACCOUNT }}
          prod-account: ${{ secrets.PROD_ACCOUNT }}
      
      - name: Discover ECS environment
        id: network
        run: |
          # ops/ecs-discover.sh is the Fargate equivalent of inventory/aws_ec2.yaml —
          # dynamic resource discovery instead of hardcoded names.
          source ops/ecs-discover.sh "${{ inputs.environment }}"

          echo "cluster=${ECS_CLUSTER}"   >> "$GITHUB_OUTPUT"
          echo "family=${ECS_FAMILY}"     >> "$GITHUB_OUTPUT"
          echo "container=${ECS_CONTAINER}" >> "$GITHUB_OUTPUT"
          echo "net_config=${ECS_NET_CONFIG}" >> "$GITHUB_OUTPUT"