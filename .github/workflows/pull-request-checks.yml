name: Pull Request Checks

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ruff-unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r requirements/requirements.dev.txt --no-deps --prefer-binary --require-hashes

      - name: Run Ruff Linter
        run: |
          source venv/bin/activate
          ruff check

      - name: Run Unit Tests
        run: |
          source venv/bin/activate
          python manage.py test --exclude=integration

  integration-test:
    env:
      AWS_REGION: us-east-1

    permissions:
      id-token: write
      contents: read

    # This will only run on test
    runs-on: codebuild-bb-test-web-server-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Django Integration Tests
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from app

