repos:
  - repo: local
    hooks:
      - id: no-locust-tokens
        name: Block committing Locust token files with tokens
        language: script
        entry: scripts/check-locust-tokens.sh
        files: ^apps/tokens_(non_v3|v3)\.txt$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version
    rev: v0.15.10
    hooks:
      # Run the linter
      - id: ruff-check
        exclude: 'migrations|docs|examples|vendor|venv|management|static'
      # Run the formatter
      - id: ruff-format
        exclude: 'migrations|docs|examples|vendor|venv|management|static'
