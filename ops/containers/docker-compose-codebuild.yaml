services:
  ####################
  # Blue Button - Codebuild
  bb-api:
    image: bb-api:codebuild
    pull_policy: never
    network_mode: "host"
    env_file: ./bb-api/files/external/.env.codebuild
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/certstore/ca.cert.pem && test -s /tmp/certstore/ca.key.nocrypt.pem"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 90s

  ####################
  # Local MSLS server for Selenium Auth Mock
  mslsx:
    image: mslsx:latest
    pull_policy: never
    network_mode: "host"
    command: scripts/internal/entrypoint.bash
