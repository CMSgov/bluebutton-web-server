services:
  ####################
  # Local Selenium Server
  selenium-tests:
    image: selenium-local:latest
    command: /code/ops/containers/selenium/start-selenium.sh
    ports:
      - "8910:8910"
      - "7890:7890"
      - "4444:4444"
      - "5901:5901"
    env_file:
      - .env.selenium
    volumes:
      - ../../..:/code
  ####################
  # Chrome for Selenium Remote — shares selenium-tests' network namespace so
  # socat in selenium-tests proxies localhost:8000/8080 for Chrome as well.
  chrome:
    image: selenium/standalone-chromium
    network_mode: "service:selenium-tests"
    depends_on:
      selenium-tests:
        condition: service_started
