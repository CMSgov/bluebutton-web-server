services:
  ####################
  # Local Selenium Server
  selenium-tests:
    image: selenium-local:latest
    command: /code/ops/containers/selenium/start-selenium.sh
    ports:
      - "8910:8910"
      - "7890:7890"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.selenium
    volumes:
      - ../../..:/code
    depends_on:
      chrome:
        condition: service_started
  ####################
  # Chrome for Selenium Remote
  chrome:
    image: selenium/standalone-chromium
    hostname: chrome
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4444:4444"
      - "5900:5900"
